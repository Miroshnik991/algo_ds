services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php84-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    tty: true
    stdin_open: true
    ports:
      - "9003:9003"
    environment:
      - XDEBUG_MODE=coverage,debug
      - XDEBUG_CONFIG=client_host=host.docker.internal
    command: ["php-fpm"]